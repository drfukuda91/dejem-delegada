<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DELEGADA - Seleção de Período</title>
    <style>
        :root {
            --cor-azul: #0056b3;       
            --cor-ouro: #d4af37;       
            --cor-verde-oliva: #556b2f; 
            --fundo-pastel: #fdfcf0;   
            --texto-principal: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--fundo-pastel);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--cor-ouro);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            width: 90%;
            max-width: 450px; /* Aumentado levemente para caber nomes extensos */
        }

        h1 {
            font-size: 1.2rem;
            color: var(--texto-principal);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
            text-align: left;
            display: block;
            margin-bottom: 5px;
        }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
            background-color: white;
            cursor: pointer;
            outline: none;
        }

        /* Container dos meses - Escondido por padrão */
        #container-meses {
            display: none; 
            margin-top: 20px;
            animation: fadeIn 0.5s;
        }

        .meses-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 meses por linha */
            gap: 10px;
        }

        .btn-mes {
            padding: 12px 5px;
            background-color: var(--cor-azul);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Efeito Hover solicitado: Verde-Oliva */
        .btn-mes:hover {
            background-color: var(--cor-verde-oliva);
            transform: translateY(-2px);
        }

        .btn-voltar {
            margin-top: 25px;
            display: inline-block;
            font-size: 0.75rem;
            color: #888;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            background: none;
            cursor: pointer;
        }

        .btn-voltar:hover {
            color: #b30000;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Escala DELEGADA</h1>
        
        <div class="form-group">
            <div>
                <label for="ano">Selecione o Ano:</label>
                <select id="ano" onchange="mostrarMeses()">
                    <option value="" disabled selected>-- Escolha o Ano --</option>
                    <option value="2026">2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                    <option value="2029">2029</option>
                    <option value="2030">2030</option>
                </select>
            </div>

            <div id="container-meses">
                <label>Selecione o Mês:</label>
                <div class="meses-grid">
                    <button class="btn-mes" onclick="consultar('Janeiro')">Janeiro</button>
                    <button class="btn-mes" onclick="consultar('Fevereiro')">Fevereiro</button>
                    <button class="btn-mes" onclick="consultar('Março')">Março</button>
                    <button class="btn-mes" onclick="consultar('Abril')">Abril</button>
                    <button class="btn-mes" onclick="consultar('Maio')">Maio</button>
                    <button class="btn-mes" onclick="consultar('Junho')">Junho</button>
                    <button class="btn-mes" onclick="consultar('Julho')">Julho</button>
                    <button class="btn-mes" onclick="consultar('Agosto')">Agosto</button>
                    <button class="btn-mes" onclick="consultar('Setembro')">Setembro</button>
                    <button class="btn-mes" onclick="consultar('Outubro')">Outubro</button>
                    <button class="btn-mes" onclick="consultar('Novembro')">Novembro</button>
                    <button class="btn-mes" onclick="consultar('Dezembro')">Dezembro</button>
                </div>
            </div>

            <a href="acesso_dejem_e_delegada.html" class="btn-voltar">← Voltar</a>
        </div>

        <footer>
            <span>3º BPM/I - PMESP</span>
        </footer>
    </div>

    <script>
    function mostrarMeses() {
        const selectAno = document.getElementById('ano');
        const container = document.getElementById('container-meses');
        if (selectAno.value !== "") {
            container.style.display = "block";
        }
    }

    function consultar(mes) {
        const ano = document.getElementById('ano').value;
        if (!ano) {
            alert("Por favor, selecione um ano primeiro.");
            return;
        }
        // Redirecionamento alterado para o calendário da delegada
        window.location.href = `calendario_delegada.html?mes=${mes}&ano=${ano}`;
    }
</script>

</body>
</html>
