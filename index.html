<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema P/3 - 3º BC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Paleta extraída do Brasão - PRESERVADA */
            --cor-azul: #0056b3;
            --cor-vermelho: #c62828;
            --cor-ouro: #d4af37;
            --fundo-pastel: #fdfcf0;
            --texto-principal: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: var(--fundo-pastel);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--cor-ouro);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .brasao-img {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.1));
        }

        h1 {
            font-size: 1.25rem;
            color: var(--texto-principal);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        h2 {
            font-size: 0.95rem;
            color: #555;
            font-weight: 400;
            margin-top: 8px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        input[type="password"] {
            width: 80%;
            padding: 10px;
            border: 2px solid var(--cor-ouro);
            border-radius: 6px;
            font-size: 0.9rem;
            text-align: center;
            background: #fff;
            transition: transform 0.2s;
        }

        input[type="password"]:focus {
            outline: none;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn {
            width: 85%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: filter 0.3s, transform 0.1s;
        }

        .btn-acessar {
            background-color: var(--cor-azul);
            color: white;
            box-shadow: 0 3px 6px rgba(0, 86, 179, 0.2);
        }

        .btn-escalas {
            background-color: var(--cor-vermelho);
            color: white;
            box-shadow: 0 3px 6px rgba(198, 40, 40, 0.2);
        }

        .btn:hover {
            filter: brightness(1.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        footer {
            margin-top: 35px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 600;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        footer span {
            display: block;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="Brasão 3BC.png" alt="Brasão 3BC" class="brasao-img">

        <h1>3º Batalhão de Caçadores</h1>
        <h2>Sistema P/3 - Acesso</h2>

        <div class="form-group">
            <input type="password" id="inputSenha" placeholder="SENHA">

            <button id="btnAcessar" class="btn btn-acessar" onclick="realizarAcesso()">Acessar</button>

            <button class="btn btn-escalas" onclick="window.location.href='acesso_dejem_e_delegada.html'">Consultar
                Escalas</button>
        </div>

        <footer>
            <span>SECRETARIA DE SEGURANÇA PÚBLICA</span>
            <span>POLÍCIA MILITAR DO ESTADO DE SÃO PAULO</span>
            <span>3º BPM/I - CEL PM SPANÓ</span>
        </footer>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE - INSIRA SEUS DADOS AQUI
        const SUPABASE_URL = 'https://nsztipranmumcaydsqad.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zenRpcHJhbm11bWNheWRzcWFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjQxNTEsImV4cCI6MjA5MjIwMDE1MX0.Y9EoPXfmTl38JbqnphbWl2_7muZz-mzxWXqtlLw7QcM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para validar a senha via Supabase Auth
        async function realizarAcesso() {
            const emailP3 = "drfukuda91@gmail.com"; // E-mail que você cadastrou no Supabase
            const senhaDigitada = document.getElementById('inputSenha').value;
            const btn = document.getElementById('btnAcessar');

            if (!senhaDigitada) {
                alert("Por favor, insira a senha.");
                return;
            }

            // Interface de carregamento
            btn.innerText = "AUTENTICANDO...";
            btn.disabled = true;

            try {
                // Realiza o login oficial
                const { data, error } = await _supabase.auth.signInWithPassword({
                    email: emailP3,
                    password: senhaDigitada,
                });

                if (error) {
                    alert("Acesso negado: Senha incorreta.");
                    document.getElementById('inputSenha').value = "";
                    document.getElementById('inputSenha').focus();
                    btn.innerText = "Acessar";
                    btn.disabled = false;
                } else {
                    // Sucesso! Redireciona para a página interna
                    window.location.href = "acesso_dejem_e_delegada.html";
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
                btn.innerText = "Acessar";
                btn.disabled = false;
            }
        }

        // Detecta a tecla Enter no campo de senha - PRESERVADO
        document.getElementById('inputSenha').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                realizarAcesso();
            }
        });
    </script>

</body>

</html>
